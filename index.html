<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #1a1a1a;
      --muted: #bbb;
      --border: #c8bfb0;
      --soft: #e8e0d4;
      --accent: #d4a843;
      --red: #c97a7a;
    }

    body { min-height: 100vh; background: var(--bg); font-family: 'Cormorant Garamond', Georgia, serif; color: var(--ink); }

    /* grain */
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px; animation:grain 0.5s steps(1) infinite; }
    @keyframes grain { 0%,100%{background-position:0 0} 10%{background-position:-5% -10%} 20%{background-position:-15% 5%} 30%{background-position:7% -25%} 40%{background-position:-5% 25%} 50%{background-position:-15% 10%} 60%{background-position:15% 0%} 70%{background-position:0 15%} 80%{background-position:3% 35%} 90%{background-position:-10% 10%} }

    /* layout */
    .page { max-width: 720px; margin: 0 auto; padding: 60px 24px 100px; }

    /* header */
    .site-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px; animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(52px, 11vw, 96px); line-height: 0.95; letter-spacing: -0.03em; animation: fadeUp 0.8s 0.05s cubic-bezier(0.22,1,0.36,1) both; }
    h1 em { font-style: italic; }
    .rule { margin-top: 32px; width: 40px; height: 1px; background: var(--ink); margin-bottom: 36px; transform-origin: left; animation: ruleIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ruleIn { from{transform:scaleX(0);opacity:0} to{transform:scaleX(1);opacity:1} }

    /* admin bar */
    .admin-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; min-height: 24px; }
    .admin-bar-left { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .admin-bar-right { display: flex; gap: 12px; align-items: center; }
    .text-btn { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; background: none; border: none; cursor: pointer; transition: color 0.15s; }
    .text-btn:hover { color: var(--ink); }
    .text-btn.primary { color: var(--ink); border: 1px solid var(--ink); padding: 6px 14px; }
    .text-btn.primary:hover { background: var(--ink); color: var(--bg); }

    /* search */
    .search-wrap { margin-bottom: 32px; position: relative; }
    .search-input { width: 100%; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--border); outline: none; padding: 8px 28px 8px 0; transition: border-color 0.15s; }
    .search-input:focus { border-bottom-color: var(--ink); }
    .search-input::placeholder { color: var(--muted); text-transform: uppercase; }
    .search-clear { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); display: none; padding: 4px; }
    .search-clear.visible { display: block; }

    /* track list */
    .track { display: grid; grid-template-columns: 80px 1fr; gap: 0 24px; border-top: 1px solid var(--border); padding: 22px 0; align-items: center; transition: background 0.15s; cursor: pointer; position: relative; }
    .track:last-child { border-bottom: 1px solid var(--border); }
    .track:hover { background: rgba(0,0,0,0.02); }
    .track.playing { background: rgba(26,26,26,0.04); border-top-color: var(--ink); }
    .track.playing + .track { border-top-color: var(--ink); }

    /* cover art — bigger */
    .track-art { width: 80px; height: 80px; background: var(--soft); flex-shrink: 0; overflow: hidden; position: relative; }
    .track-art img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .track:hover .track-art img { transform: scale(1.04); }
    .track-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--muted); }
    .track-art-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; background: rgba(26,26,26,0.45); }
    .track:hover .track-art-overlay { opacity: 1; }
    .track.playing .track-art-overlay { opacity: 1; background: rgba(26,26,26,0.55); }
    .overlay-icon { width: 22px; height: 22px; fill: #f5f0e8; }

    /* track info */
    .track-body { display: flex; flex-direction: column; gap: 5px; }
    .track-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 22px; letter-spacing: 0.01em; line-height: 1.1; }
    .track.playing .track-title { font-weight: 600; }
    .track-desc { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-style: italic; color: #999; line-height: 1.4; }
    .track-tags { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; }
    .track-tag { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .track-tag span { color: var(--ink); }

    /* playing indicator — animated bars */
    .playing-bars { display: none; align-items: flex-end; gap: 2px; height: 12px; margin-top: 6px; }
    .track.playing .playing-bars { display: flex; }
    .playing-bars span { display: block; width: 3px; background: var(--accent); border-radius: 1px; }
    .playing-bars span:nth-child(1) { animation: bar 0.8s 0s ease-in-out infinite alternate; }
    .playing-bars span:nth-child(2) { animation: bar 0.8s 0.2s ease-in-out infinite alternate; }
    .playing-bars span:nth-child(3) { animation: bar 0.8s 0.4s ease-in-out infinite alternate; }
    .playing-bars.paused span { animation-play-state: paused; }
    @keyframes bar { from{height:3px} to{height:12px} }

    /* player bar */
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: var(--bg); z-index: 1000;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      border-top: 1px solid #333; }
    .player-bar.visible { transform: translateY(0); }
    .player-inner { max-width: 720px; margin: 0 auto; padding: 0 24px; height: 68px; display: flex; align-items: center; gap: 20px; }

    .player-art { width: 40px; height: 40px; background: #2a2a2a; flex-shrink: 0; overflow: hidden; }
    .player-art img { width: 100%; height: 100%; object-fit: cover; }
    .player-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 16px; }

    .player-info { flex: 0 0 auto; min-width: 0; max-width: 200px; }
    .player-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-meta { font-family: 'DM Mono', monospace; font-size: 8px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    .player-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .ctrl-btn { background: none; border: none; cursor: pointer; color: #f5f0e8; opacity: 0.5; transition: opacity 0.15s, color 0.15s; padding: 4px; display: flex; }
    .ctrl-btn:hover { opacity: 1; }
    .ctrl-btn.play-pause { opacity: 1; }
    .ctrl-btn svg { width: 17px; height: 17px; fill: currentColor; }
    .ctrl-btn.play-pause svg { width: 24px; height: 24px; }
    .ctrl-btn.active { opacity: 1; color: var(--accent); }

    .player-progress { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .time { font-family: 'DM Mono', monospace; font-size: 9px; color: #555; letter-spacing: 0.05em; flex-shrink: 0; }
    .progress-track { flex: 1; height: 2px; background: #2a2a2a; cursor: pointer; position: relative; border-radius: 1px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; width: 0%; transition: width 0.1s linear; pointer-events: none; }
    .progress-track:hover .progress-fill { background: #f5f0e8; }
    .progress-track:hover { height: 3px; }

    /* empty state */
    .empty { padding: 60px 0; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }

    /* modal overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(245,240,232,0.9); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg); border: 1px solid var(--border); padding: 36px; max-width: 420px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.1); }
    .modal-box h3 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 28px; margin-bottom: 24px; }
    .field { margin-bottom: 18px; }
    .field label { font-family: 'DM Mono', monospace; font-size: 9px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .field input, .field textarea { width: 100%; font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--border); outline: none; padding: 6px 0; resize: none; }
    .field input:focus, .field textarea:focus { border-bottom-color: var(--ink); }
    .field textarea { min-height: 60px; line-height: 1.5; font-style: italic; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 28px; }
    .btn-primary { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; background: var(--ink); color: var(--bg); border: none; padding: 10px 20px; cursor: pointer; flex: 1; transition: background 0.15s; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; background: none; color: #888; border: 1px solid var(--border); padding: 10px 20px; cursor: pointer; flex: 1; transition: border-color 0.15s; }
    .btn-secondary:hover { border-color: #a09890; }
    .form-error { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--red); letter-spacing: 0.05em; margin-top: 10px; min-height: 14px; }

    /* login form */
    .auth-box { max-width: 360px; width: 100%; }
    .auth-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 36px; margin-bottom: 28px; }

    /* delete/edit btns on track */
    .track-actions { position: absolute; top: 22px; right: 0; display: flex; gap: 8px; opacity: 0; transition: opacity 0.12s; }
    .track:hover .track-actions { opacity: 1; }
    .track-del, .track-edit { font-family: 'DM Mono', monospace; font-size: 9px; background: none; border: none; cursor: pointer; letter-spacing: 0.05em; padding: 2px 4px; }
    .track-del { color: var(--red); }
    .track-edit { color: var(--muted); }
    .track-edit:hover { color: var(--ink); }

    /* loading */
    .loading { padding: 60px 0; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }

    /* track entrance */
    @keyframes trackIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .track { animation: trackIn 0.35s cubic-bezier(0.22,1,0.36,1) both; }
  </style>
</head>
<body>

<!-- Upload modal -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal-box">
    <h3 id="upload-modal-title"><em>Add a track</em></h3>
    <div class="field">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="Untitled" />
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="A few words about the track…" rows="2"></textarea>
    </div>
    <div class="field">
      <label>Audio URL <span style="color:#bbb;font-size:8px">(Dropbox / Drive direct link)</span></label>
      <input type="url" id="f-url" placeholder="https://…" />
    </div>
    <div class="field">
      <label>Cover Art URL <span style="color:#bbb;font-size:8px">(optional)</span></label>
      <input type="url" id="f-art" placeholder="https://…" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>BPM</label>
        <input type="text" id="f-bpm" placeholder="120" />
      </div>
      <div class="field">
        <label>Key</label>
        <input type="text" id="f-key" placeholder="A minor" />
      </div>
    </div>
    <div class="form-error" id="upload-error"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="upload-submit">Add track</button>
      <button class="btn-secondary" id="upload-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-box auth-box">
    <h3 class="auth-title"><em>Admin</em></h3>
    <div class="field"><label>Password</label><input type="password" id="admin-password" placeholder="••••••••" /></div>
    <div class="form-error" id="login-error"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="login-submit">Sign in</button>
      <button class="btn-secondary" id="login-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p style="font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:8px;">Delete this track?</p>
    <small id="confirm-label" style="font-family:'DM Mono',monospace;font-size:9px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:20px;">—</small>
    <div class="modal-actions">
      <button class="btn-secondary" id="confirm-cancel">Cancel</button>
      <button class="btn-primary" id="confirm-ok" style="background:var(--red);">Delete</button>
    </div>
  </div>
</div>

<!-- Player bar -->
<div class="player-bar" id="player-bar">
  <div class="player-inner">
    <div class="player-art" id="player-art">
      <div class="player-art-placeholder">♪</div>
    </div>
    <div class="player-info">
      <div class="player-title" id="player-title">—</div>
      <div class="player-meta" id="player-meta">—</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="ctrl-shuffle" title="Shuffle">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17zm4.76-.18 3.65 3.65-3.65 3.65V14h-1.94L9 9.41 10.41 8l3.94 3.94V9h1.94zM4 18.59 5.41 20l5.17-5.17-1.42-1.41zm10.41.41v-2h1.94L20 21l1.41-1.41-14-14L6 7l3.76 3.76-.17.17L8.41 9.76 4 5.35 2.59 6.76l4.41 4.41L4 18.59 5.41 20l5.17-5.17 1.42 1.41L8.41 19H6v-2l-2-2v4l2 2h10v-2h-1.59z"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-prev" title="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="ctrl-play" title="Play / Pause">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-next" title="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.09 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-loop" title="Loop">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
    <div class="player-progress">
      <span class="time" id="time-current">0:00</span>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time" id="time-total">0:00</span>
    </div>
  </div>
</div>

<audio id="audio-el"></audio>

<div class="page">
  <div class="site-meta">Demos</div>
  <h1>Things I've<br /><em>Been Making</em></h1>
  <div class="rule"></div>

  <div class="admin-bar">
    <span class="admin-bar-left" id="track-count">—</span>
    <div class="admin-bar-right" id="admin-controls" style="display:none">
      <button class="text-btn primary" id="add-track-btn">+ Add track</button>
      <button class="text-btn" id="logout-btn">Sign out</button>
    </div>
    <div id="login-link-wrap">
      <button class="text-btn" id="login-link">Admin ↗</button>
    </div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="Search tracks…" autocomplete="off" />
    <button class="search-clear" id="search-clear">✕</button>
  </div>

  <div id="track-list"><div class="loading">Loading…</div></div>
</div>

<script>
  const SUPABASE_URL      = "https://mofbgslzyssfsxifqixs.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_d5PlNn4UKuNbNijlpXEzOg_nYy3gr9a";
  const TABLE = "demos";
  // Change this to whatever password you want
  const ADMIN_PASSWORD = "demos2026";
  const H = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  };

  const $ = id => document.getElementById(id);
  let tracks = [];
  let isAdmin = localStorage.getItem("demos-admin") === "1";
  let currentIdx = null;
  let confirmCb = null;
  let loopOn = false;
  let shuffleOn = false;
  let searchQuery = "";

  // ── Auth ───────────────────────────────────────────────────────────
  function renderAdminState() {
    $("admin-controls").style.display = isAdmin ? "flex" : "none";
    $("login-link-wrap").style.display = isAdmin ? "none" : "block";
  }

  $("login-link").addEventListener("click", () => $("login-modal").classList.add("open"));
  $("login-cancel").addEventListener("click", () => { $("login-modal").classList.remove("open"); $("login-error").textContent = ""; });
  $("login-submit").addEventListener("click", doLogin);
  $("admin-password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  function doLogin() {
    if ($("admin-password").value === ADMIN_PASSWORD) {
      isAdmin = true;
      localStorage.setItem("demos-admin", "1");
      $("login-modal").classList.remove("open");
      $("admin-password").value = "";
      $("login-error").textContent = "";
      renderAdminState();
      render();
    } else {
      $("login-error").textContent = "Incorrect password.";
    }
  }

  $("logout-btn").addEventListener("click", () => {
    isAdmin = false;
    localStorage.removeItem("demos-admin");
    renderAdminState();
    render();
  });

  // ── API ────────────────────────────────────────────────────────────
  async function loadTracks() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?select=*&order=created_at.desc", { headers: H });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function insertTrack(data) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE, {
      method: "POST",
      headers: { ...H, "Prefer": "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return (await res.json())[0];
  }

  async function deleteTrack(id) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?id=eq." + id, {
      method: "DELETE", headers: H,
    });
    if (!res.ok) throw new Error(await res.text());
  }

  async function patchTrack(id, data) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?id=eq." + id, {
      method: "PATCH",
      headers: { ...H, "Prefer": "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return (await res.json())[0];
  }

  // ── Data ───────────────────────────────────────────────────────────
  async function init() {
    try {
      tracks = await loadTracks();
      render();
    } catch(e) {
      console.error(e);
      $("track-list").innerHTML = '<div class="loading" style="color:var(--red)">Could not connect.</div>';
    }
  }

  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
      + " · " + d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }).toLowerCase();
  }

  // ── Render ─────────────────────────────────────────────────────────
  function render() {
    const list = $("track-list");
    list.innerHTML = "";
    const q = searchQuery.toLowerCase();
    const filtered = tracks.filter(t => !q || t.title.toLowerCase().includes(q));
    $("track-count").textContent = tracks.length + " track" + (tracks.length !== 1 ? "s" : "")
      + (q && filtered.length !== tracks.length ? " · " + filtered.length + " match" + (filtered.length !== 1 ? "es" : "") : "");

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">' + (q ? "No matches." : "No tracks yet.") + '</div>';
      return;
    }

    filtered.forEach((t, fi) => {
      const i = tracks.indexOf(t);
      const el = document.createElement("div");
      el.className = "track" + (currentIdx === i ? " playing" : "");
      el.style.animationDelay = (fi * 0.05) + "s";

      const artHTML = t.art_url
        ? `<img src="${t.art_url}" alt="" />`
        : `<div class="track-art-placeholder">♪</div>`;

      el.innerHTML = `
        <div class="track-art">
          ${artHTML}
          <div class="track-art-overlay">
            <svg class="overlay-icon" id="overlay-icon-${i}" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
        </div>
        <div class="track-body">
          <div class="track-title">${t.title}</div>
          ${t.description ? `<div class="track-desc">${t.description}</div>` : ""}
          <div class="track-tags">
            ${t.bpm ? `<div class="track-tag">BPM <span>${t.bpm}</span></div>` : ""}
            ${t.key ? `<div class="track-tag">Key <span>${t.key}</span></div>` : ""}
            ${t.created_at ? `<div class="track-tag">Added <span>${fmtDate(t.created_at)}</span></div>` : ""}
          </div>
          <div class="playing-bars" id="bars-${i}"><span></span><span></span><span></span></div>
        </div>
        ${isAdmin ? `<div class="track-actions"><button class="track-edit">Edit</button><button class="track-del">Delete</button></div>` : ""}
      `;

      el.addEventListener("click", e => {
        if (e.target.classList.contains("track-del") || e.target.classList.contains("track-edit")) return;
        playTrack(i);
      });

      if (isAdmin) {
        el.querySelector(".track-del").addEventListener("click", e => {
          e.stopPropagation();
          showConfirm(t.title, async () => {
            if (currentIdx === i) stopPlayer();
            await deleteTrack(t.id);
            tracks.splice(i, 1);
            if (currentIdx !== null) {
              if (currentIdx === i) currentIdx = null;
              else if (currentIdx > i) currentIdx--;
            }
            render();
          });
        });

        el.querySelector(".track-edit").addEventListener("click", e => {
          e.stopPropagation();
          openEditModal(t, i);
        });
      }

      list.appendChild(el);
    });
  }

  // ── Player ─────────────────────────────────────────────────────────
  const audio = $("audio-el");

  function fmtTime(s) {
    if (isNaN(s)) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + String(sec).padStart(2, "0");
  }

  function playTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    const t = tracks[idx];
    if (!t.audio_url) return;

    currentIdx = idx;

    // Update player bar
    $("player-title").textContent = t.title;
    $("player-meta").textContent = [t.bpm ? t.bpm + " BPM" : "", t.key || ""].filter(Boolean).join(" · ") || fmtDate(t.created_at);

    if (t.art_url) {
      $("player-art").innerHTML = `<img src="${t.art_url}" alt="" />`;
    } else {
      $("player-art").innerHTML = `<div class="player-art-placeholder">♪</div>`;
    }

    audio.src = t.audio_url;
    audio.play();
    $("player-bar").classList.add("visible");
    render();
    updatePlayIcon(true);
  }

  function stopPlayer() {
    audio.pause();
    audio.src = "";
    currentIdx = null;
    $("player-bar").classList.remove("visible");
  }

  function updatePlayIcon(playing) {
    // Player bar icon
    $("play-icon").innerHTML = playing
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
    // Overlay icon on the playing track
    if (currentIdx !== null) {
      const overlayIcon = document.getElementById("overlay-icon-" + currentIdx);
      if (overlayIcon) overlayIcon.innerHTML = playing
        ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
        : '<path d="M8 5v14l11-7z"/>';
      const bars = document.getElementById("bars-" + currentIdx);
      if (bars) bars.classList.toggle("paused", !playing);
    }
  }

  $("ctrl-play").addEventListener("click", () => {
    if (audio.paused) { audio.play(); updatePlayIcon(true); }
    else { audio.pause(); updatePlayIcon(false); }
  });

  $("ctrl-prev").addEventListener("click", () => {
    if (currentIdx !== null && currentIdx > 0) playTrack(currentIdx - 1);
  });

  $("ctrl-next").addEventListener("click", () => {
    if (currentIdx !== null && currentIdx < tracks.length - 1) playTrack(currentIdx + 1);
  });

  $("ctrl-loop").addEventListener("click", () => {
    loopOn = !loopOn;
    $("ctrl-loop").classList.toggle("active", loopOn);
    if (loopOn) shuffleOn = false, $("ctrl-shuffle").classList.remove("active");
  });

  $("ctrl-shuffle").addEventListener("click", () => {
    shuffleOn = !shuffleOn;
    $("ctrl-shuffle").classList.toggle("active", shuffleOn);
    if (shuffleOn) loopOn = false, $("ctrl-loop").classList.remove("active");
  });

  audio.addEventListener("timeupdate", () => {
    $("time-current").textContent = fmtTime(audio.currentTime);
    $("time-total").textContent = fmtTime(audio.duration);
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    $("progress-fill").style.width = pct + "%";
  });

  audio.addEventListener("ended", () => {
    if (loopOn) {
      audio.currentTime = 0;
      audio.play();
    } else if (shuffleOn && tracks.length > 1) {
      let next;
      do { next = Math.floor(Math.random() * tracks.length); } while (next === currentIdx);
      playTrack(next);
    } else if (currentIdx !== null && currentIdx < tracks.length - 1) {
      playTrack(currentIdx + 1);
    } else {
      // stop cleanly — reset icon and bars
      currentIdx = null;
      updatePlayIcon(false);
      render();
    }
  });

  // ── Search ─────────────────────────────────────────────────────────
  $("search-input").addEventListener("input", e => {
    searchQuery = e.target.value;
    $("search-clear").classList.toggle("visible", !!searchQuery);
    render();
  });
  $("search-clear").addEventListener("click", () => {
    searchQuery = "";
    $("search-input").value = "";
    $("search-clear").classList.remove("visible");
    render();
  });

  $("progress-track").addEventListener("click", e => {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  // ── Upload / Edit ──────────────────────────────────────────────────
  let editingTrackId = null;
  let editingTrackIdx = null;

  function openAddModal() {
    editingTrackId = null;
    editingTrackIdx = null;
    $("upload-modal-title").innerHTML = "<em>Add a track</em>";
    $("upload-submit").textContent = "Add track";
    $("upload-error").textContent = "";
    ["f-title","f-desc","f-url","f-art","f-bpm","f-key"].forEach(id => $(id).value = "");
    $("upload-modal").classList.add("open");
  }

  function openEditModal(t, idx) {
    editingTrackId = t.id;
    editingTrackIdx = idx;
    $("upload-modal-title").innerHTML = "<em>Edit track</em>";
    $("upload-submit").textContent = "Save changes";
    $("upload-error").textContent = "";
    $("f-title").value = t.title || "";
    $("f-desc").value = t.description || "";
    $("f-url").value = t.audio_url || "";
    $("f-art").value = t.art_url || "";
    $("f-bpm").value = t.bpm || "";
    $("f-key").value = t.key || "";
    $("upload-modal").classList.add("open");
  }

  $("add-track-btn").addEventListener("click", openAddModal);
  $("upload-cancel").addEventListener("click", () => $("upload-modal").classList.remove("open"));

  $("upload-submit").addEventListener("click", async () => {
    const title = $("f-title").value.trim();
    const url   = $("f-url").value.trim();
    if (!title) { $("upload-error").textContent = "Title is required."; return; }
    if (!url)   { $("upload-error").textContent = "Audio URL is required."; return; }

    const data = {
      title,
      description: $("f-desc").value.trim() || null,
      audio_url: url,
      art_url: $("f-art").value.trim() || null,
      bpm: $("f-bpm").value.trim() || null,
      key: $("f-key").value.trim() || null,
    };

    $("upload-submit").textContent = editingTrackId ? "Saving…" : "Adding…";
    try {
      if (editingTrackId) {
        const updated = await patchTrack(editingTrackId, data);
        tracks[editingTrackIdx] = updated;
      } else {
        const track = await insertTrack(data);
        tracks.unshift(track);
      }
      $("upload-modal").classList.remove("open");
      render();
    } catch(e) {
      $("upload-error").textContent = "Failed to save. Check the URL and try again.";
      console.error(e);
    }
    $("upload-submit").textContent = editingTrackId ? "Save changes" : "Add track";
  });

  // ── Confirm ────────────────────────────────────────────────────────
  function showConfirm(title, cb) {
    $("confirm-label").textContent = title.toUpperCase();
    $("confirm-modal").classList.add("open");
    confirmCb = cb;
  }
  $("confirm-cancel").addEventListener("click", () => { $("confirm-modal").classList.remove("open"); confirmCb = null; });
  $("confirm-ok").addEventListener("click", () => { if (confirmCb) confirmCb(); $("confirm-modal").classList.remove("open"); confirmCb = null; });

  // ── Init ───────────────────────────────────────────────────────────
  renderAdminState();
  init();
</script>
</body>
</html>
